<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="每日单词">
<meta name="theme-color" content="#FF6B6B">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%23FF6B6B'/><stop offset='50%25' style='stop-color:%23FFD93D'/><stop offset='100%25' style='stop-color:%236BCB77'/></linearGradient></defs><rect width='180' height='180' rx='36' fill='url(%23g)'/><text x='90' y='110' text-anchor='middle' font-size='80' fill='white'>A</text></svg>">
<title>每日单词</title>
<style>
:root {
  --bg: #FFF5F5;
  --card-bg: #FFFFFF;
  --text: #2D3436;
  --sub: #636E72;
  --muted: #95A5A6;
  --coral: #FF6B6B;
  --yellow: #FFD93D;
  --green: #6BCB77;
  --teal: #4ECDC4;
  --purple: #A66CFF;
  --pink: #FF8C94;
  --shadow: 0 4px 24px rgba(255,107,107,0.12);
  --radius: 20px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;min-height:-webkit-fill-available;
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  padding-bottom:env(safe-area-inset-bottom,20px);
}
.header-glow{position:fixed;top:0;left:0;right:0;height:6px;
  background:linear-gradient(90deg,var(--coral),var(--yellow),var(--green),var(--teal),var(--purple));z-index:100}
.container{max-width:430px;margin:0 auto;padding:20px 16px 40px}
.hidden{display:none!important}

/* 登录页 */
.login-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{font-size:22px;font-weight:800;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--sub);margin-bottom:28px}
.user-list{width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px}
.user-card{
  display:flex;align-items:center;gap:12px;
  background:var(--card-bg);border-radius:16px;padding:16px;
  box-shadow:0 2px 16px rgba(0,0,0,0.06);cursor:pointer;
  transition:transform 0.15s;border-left:4px solid var(--coral)
}
.user-card:nth-child(3n+1){border-left-color:var(--coral)}
.user-card:nth-child(3n+2){border-left-color:var(--purple)}
.user-card:nth-child(3n+0){border-left-color:var(--teal)}
.user-card:active{transform:scale(0.97)}
.user-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:20px;font-weight:700;flex-shrink:0}
.avatar-coral{background:linear-gradient(135deg,var(--coral),var(--pink))}
.avatar-purple{background:linear-gradient(135deg,var(--purple),var(--coral))}
.avatar-teal{background:linear-gradient(135deg,var(--teal),var(--green))}
.user-info{flex:1}
.user-name{font-size:15px;font-weight:700}
.user-meta{font-size:11px;color:var(--muted);margin-top:2px}
.user-badge{font-size:12px;background:#FFF5F5;color:var(--coral);padding:3px 10px;border-radius:10px;font-weight:600}
.create-btn{margin-top:16px;width:100%;max-width:360px;padding:14px;border:2px dashed #ddd;border-radius:16px;background:none;font-size:14px;color:var(--sub);cursor:pointer;transition:border-color 0.2s}
.create-btn:active{border-color:var(--coral);color:var(--coral)}

/* 创建用户弹窗 */
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.dialog{
  background:var(--card-bg);border-radius:24px;padding:28px 24px 22px;
  width:100%;max-width:340px;animation:popIn 0.25s ease
}
@keyframes popIn{from{transform:scale(0.9);opacity:0}}
.dialog h4{font-size:18px;margin-bottom:16px}
.dialog label{font-size:12px;color:var(--sub);display:block;margin-bottom:4px;margin-top:12px}
.dialog label:first-of-type{margin-top:0}
.dialog input{
  width:100%;padding:12px 14px;border:2px solid #eee;border-radius:12px;
  font-size:15px;outline:none;transition:border-color 0.2s;
  font-family:inherit
}
.dialog input:focus{border-color:var(--coral)}
.dialog .btns{display:flex;gap:10px;margin-top:20px}
.dialog .btns button{flex:1;padding:12px;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer}
.dialog .btn-cancel{background:#f5f5f5;color:var(--sub)}
.dialog .btn-ok{background:linear-gradient(135deg,var(--coral),var(--pink));color:white}
.dialog .btn-danger{background:linear-gradient(135deg,#e74c3c,#c0392b);color:white}
.dialog .error{font-size:12px;color:#e74c3c;margin-top:6px}

/* 主页面 */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-top:14px;margin-bottom:6px}
.logo{font-size:20px;font-weight:800;
  background:linear-gradient(135deg,var(--coral),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top-btns{display:flex;gap:8px;align-items:center}
.avatar-btn{width:34px;height:34px;border-radius:50%;border:none;color:white;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.icon-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--card-bg);box-shadow:0 2px 12px rgba(0,0,0,0.07);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.15s}
.icon-btn:active{transform:scale(0.9)}

.progress-section{margin:6px 0 14px}
.progress-label{font-size:12px;color:var(--sub);margin-bottom:3px;display:flex;justify-content:space-between}
.progress-bar-wrap{height:7px;border-radius:10px;background:#F0E0E0;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--green),var(--teal));transition:width 0.5s ease}

.word-list{display:flex;flex-direction:column;gap:10px}
.word-card{
  background:var(--card-bg);border-radius:var(--radius);padding:14px 16px;
  box-shadow:var(--shadow);cursor:pointer;position:relative;
  border-left:5px solid transparent;animation:cardIn 0.4s ease both
}
.word-card:active{transform:scale(0.97)}
.word-card:nth-child(8n+1){border-left-color:var(--coral)}
.word-card:nth-child(8n+2){border-left-color:var(--yellow)}
.word-card:nth-child(8n+3){border-left-color:var(--green)}
.word-card:nth-child(8n+4){border-left-color:var(--teal)}
.word-card:nth-child(8n+5){border-left-color:var(--purple)}
.word-card:nth-child(8n+6){border-left-color:var(--pink)}
.word-card:nth-child(8n+7){border-left-color:#FF8C42}
.word-card:nth-child(8n+0){border-left-color:#45B7D1}
.word-main{font-size:24px;font-weight:700;letter-spacing:0.3px}
.word-phonetic{font-size:13px;color:var(--sub);margin:2px 0 5px;font-family:'SF Mono',Menlo,monospace}
.word-zh{font-size:14px;color:#555;margin-bottom:3px}
.word-example{font-size:12px;color:var(--muted);font-style:italic;border-left:2px solid var(--teal);padding-left:8px;line-height:1.5}
.word-speaker{position:absolute;right:12px;top:12px;width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--coral),var(--pink));
  display:flex;align-items:center;justify-content:center;color:white;font-size:14px;opacity:0.85;transition:transform 0.1s}
.word-card:active .word-speaker{transform:scale(0.88)}
.word-card.pronouncing{border-color:var(--teal)!important;box-shadow:0 0 0 4px rgba(78,205,196,0.25)!important}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.bottom-bar{display:flex;gap:10px;margin-top:18px}
.btn{flex:1;padding:13px 0;border:none;border-radius:16px;font-size:14px;font-weight:600;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s}
.btn:active{transform:scale(0.95)}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--coral));color:white;box-shadow:0 4px 16px rgba(166,108,255,0.3)}
.btn-secondary{background:var(--card-bg);color:var(--text);box-shadow:0 2px 12px rgba(0,0,0,0.05)}

/* 面板 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:flex-end;animation:fadeIn 0.2s}
@keyframes fadeIn{from{opacity:0}}
.panel{background:var(--card-bg);border-radius:24px 24px 0 0;width:100%;max-width:430px;margin:0 auto;padding:20px 20px 40px;max-height:85vh;overflow-y:auto;animation:slideUp 0.3s ease;box-shadow:0 -8px 40px rgba(0,0,0,0.12)}
@keyframes slideUp{from{transform:translateY(100%)}}
.panel-handle{width:36px;height:5px;border-radius:4px;background:#ddd;margin:0 auto 16px}
.panel h3{font-size:17px;font-weight:700;margin-bottom:14px}

/* 用户面板 */
.user-panel-item{display:flex;align-items:center;gap:10px;padding:12px;border-radius:14px;margin-bottom:6px;border:2px solid transparent;cursor:pointer}
.user-panel-item.active{border-color:var(--coral);background:linear-gradient(135deg,#FFF,#FFF5F5)}
.user-panel-item:active{background:#f9f9f9}
.up-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:16px;font-weight:700;flex-shrink:0}
.up-info{flex:1}
.up-name{font-size:14px;font-weight:700}
.up-desc{font-size:11px;color:var(--muted)}
.up-actions{display:flex;gap:6px}
.up-btn{padding:6px 12px;border:none;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer}
.up-btn-enter{background:var(--coral);color:white}
.up-btn-del{background:#fee;color:#c0392b}
.panel-divider{height:1px;background:#eee;margin:12px 0}
.new-user-btn{width:100%;padding:12px;border:2px dashed #ddd;border-radius:14px;background:none;font-size:14px;color:var(--sub);cursor:pointer}

/* 二级菜单 */
.cat-group{margin-bottom:16px}
.cat-group-header{display:flex;align-items:center;gap:8px;padding:12px 14px;background:#FAFAFA;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;user-select:none;-webkit-user-select:none;transition:background 0.2s}
.cat-group-header:active{background:#F0F0F0}
.cat-group-arrow{margin-left:auto;font-size:12px;transition:transform 0.25s;color:var(--sub)}
.cat-group.open .cat-group-arrow{transform:rotate(180deg)}
.cat-group-body{display:none;flex-direction:column;gap:6px;padding:8px 0 0 6px}
.cat-group.open .cat-group-body{display:flex}
.sub-option{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;background:#FFF;border:2px solid #eee;cursor:pointer;transition:border-color 0.2s}
.sub-option:active{transform:scale(0.98)}
.sub-option.selected{border-color:var(--coral);background:linear-gradient(135deg,#FFF,#FFF5F5)}
.sub-dot{width:8px;height:8px;border-radius:50%;background:#ddd;flex-shrink:0}
.sub-option.selected .sub-dot{background:var(--coral)}
.sub-info{flex:1}
.sub-name{font-size:13px;font-weight:600}
.sub-desc{font-size:11px;color:var(--muted)}
.sub-check{width:20px;height:20px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sub-option.selected .sub-check{background:linear-gradient(135deg,var(--coral),var(--pink));border-color:var(--coral)}
.sub-option.selected .sub-check::after{content:'✓';color:white;font-size:11px;font-weight:700}

.count-opts{display:flex;gap:6px;margin-bottom:18px}
.count-btn{flex:1;padding:10px 0;border:2px solid #eee;border-radius:12px;background:#FAFAFA;font-size:15px;font-weight:700;cursor:pointer;transition:border-color 0.2s,background 0.2s}
.count-btn.selected{border-color:var(--coral);background:#FFF5F5;color:var(--coral)}
.count-btn:active{transform:scale(0.95)}

.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat-card{background:#FAFAFA;border-radius:14px;padding:14px 10px;text-align:center;border-top:3px solid var(--coral)}
.stat-card:nth-child(1){border-top-color:var(--coral)}
.stat-card:nth-child(2){border-top-color:var(--teal)}
.stat-card:nth-child(3){border-top-color:var(--yellow)}
.stat-card:nth-child(4){border-top-color:var(--purple)}
.stat-val{font-size:26px;font-weight:800;
  background:linear-gradient(135deg,var(--coral),var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.streak-section{text-align:center;padding:10px 0}
.streak-emoji{font-size:36px}
.streak-msg{font-size:13px;color:var(--sub);margin-top:4px}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#2D3436;color:white;padding:10px 22px;border-radius:20px;font-size:13px;z-index:500;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="header-glow"></div>

<!-- 登录页 -->
<div class="login-page hidden" id="loginPage">
  <div class="login-logo">📖</div>
  <div class="login-title">选择你的身份</div>
  <div class="login-sub">同一部手机，各自记录</div>
  <div class="user-list" id="userList"></div>
  <button class="create-btn" onclick="showCreate()">+ 添加新用户</button>
</div>

<!-- 创建用户弹窗 -->
<div class="dialog-overlay hidden" id="createDialog" onclick="if(event.target===this)hideDialog('createDialog')">
  <div class="dialog">
    <h4>👤 创建新用户</h4>
    <label>名字</label>
    <input id="newName" maxlength="10" placeholder="如：小明">
    <label>密码</label>
    <input id="newPwd" type="password" maxlength="20" placeholder="6~20位，用于管理账户">
    <div class="error hidden" id="createErr"></div>
    <div class="btns">
      <button class="btn-cancel" onclick="hideDialog('createDialog')">取消</button>
      <button class="btn-ok" onclick="doCreate()">创建</button>
    </div>
  </div>
</div>

<!-- 删除确认弹窗 -->
<div class="dialog-overlay hidden" id="delDialog" onclick="if(event.target===this)hideDialog('delDialog')">
  <div class="dialog">
    <h4>🗑 删除账户</h4>
    <p style="font-size:13px;color:var(--sub);margin-bottom:12px">将删除 <b id="delTarget">--</b> 的所有学习记录，不可恢复。</p>
    <label>请输入密码确认</label>
    <input id="delPwd" type="password" placeholder="输入该账户的密码">
    <div class="error hidden" id="delErr"></div>
    <div class="btns">
      <button class="btn-cancel" onclick="hideDialog('delDialog')">取消</button>
      <button class="btn-danger" onclick="doDelete()">确认删除</button>
    </div>
  </div>
</div>

<!-- 主页面 -->
<div class="container hidden" id="mainPage">
  <div class="top-bar">
    <span class="logo">📖 每日词汇</span>
    <div class="top-btns">
      <button class="avatar-btn avatar-coral" id="avatarBtn" onclick="showUserPanel()">我</button>
      <button class="icon-btn" onclick="openStats()">📊</button>
      <button class="icon-btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>
  <div class="progress-section">
    <div class="progress-label"><span>今日已学</span><span id="progText">0 / 3</span></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progBar" style="width:0%"></div></div>
  </div>
  <div class="word-list" id="wordList"></div>
  <div class="bottom-bar">
    <button class="btn btn-secondary" onclick="refreshWords()">🔄 换一批</button>
    <button class="btn btn-primary" onclick="speakAll()">🔊 连续朗读</button>
  </div>
</div>

<!-- 用户管理面板 -->
<div class="overlay hidden" id="userOverlay" onclick="if(event.target===this)hidePanel('userOverlay')">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-handle"></div>
    <h3>👤 切换账户</h3>
    <div id="userPanelList"></div>
    <div class="panel-divider"></div>
    <button class="new-user-btn" onclick="hidePanel('userOverlay');showCreate()">+ 添加新用户</button>
    <button class="btn btn-secondary" style="width:100%;margin-top:10px" onclick="hidePanel('userOverlay')">关闭</button>
  </div>
</div>

<!-- 设置面板 -->
<div class="overlay hidden" id="settingsOverlay" onclick="if(event.target===this)hidePanel('settingsOverlay')">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-handle"></div>
    <h3>⚙️ 词库设置</h3>
    <div id="catGroups"></div>
    <h3>每日词数</h3>
    <div class="count-opts" id="countOpts"></div>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button class="btn btn-secondary" onclick="hidePanel('settingsOverlay')">取消</button>
      <button class="btn btn-primary" onclick="saveAndClose()">保存</button>
    </div>
  </div>
</div>

<!-- 统计面板 -->
<div class="overlay hidden" id="statsOverlay" onclick="if(event.target===this)hidePanel('statsOverlay')">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-handle"></div>
    <h3>📊 学习记录</h3>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" id="statDays">0</div><div class="stat-label">已学天数</div></div>
      <div class="stat-card"><div class="stat-val" id="statWords">0</div><div class="stat-label">累计单词</div></div>
      <div class="stat-card"><div class="stat-val" id="statStreak">0</div><div class="stat-label">连续打卡</div></div>
      <div class="stat-card"><div class="stat-val" id="statCat">--</div><div class="stat-label">当前分类</div></div>
    </div>
    <div class="streak-section"><div class="streak-emoji" id="streakEmoji">😴</div><div class="streak-msg" id="streakMsg"></div></div>
    <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="hidePanel('statsOverlay')">关闭</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

// ==================== 用户系统 ====================
var USER_KEY='vw_users',CUR_KEY='vw_current';
function getUsers(){try{var d=localStorage.getItem(USER_KEY);return d?JSON.parse(d):[];}catch(e){return[];}}
function saveUsers(users){localStorage.setItem(USER_KEY,JSON.stringify(users));}
function getCurrentUser(){return localStorage.getItem(CUR_KEY);}

function userStateKey(name){return 'vw_'+name;}

function loadUserData(name){
  var key=userStateKey(name);
  try{var d=localStorage.getItem(key);return d?JSON.parse(d):mkDefaultState();}catch(e){return mkDefaultState();}
}
function saveUserData(name,st){localStorage.setItem(userStateKey(name),JSON.stringify(st));}
function mkDefaultState(){return{range:'grade7',count:3,learnedDays:{}};}

// ==================== 全局状态 ====================
var currentUser=null,state=null,words=[],learned=[];

// ==================== 初始化 ====================
function init(){
  var cu=getCurrentUser();
  if(cu){
    var users=getUsers();
    var found=users.find(function(u){return u.name===cu;});
    if(found){loginAs(cu);return;}
  }
  // 无当前用户或当前用户被删除
  var users=getUsers();
  if(users.length===1){
    // 只有一个用户，自动登录
    loginAs(users[0].name);
  }else{
    showLogin();
  }
}

function loginAs(name){
  currentUser=name;
  localStorage.setItem(CUR_KEY,name);
  state=loadUserData(name);
  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('mainPage').classList.remove('hidden');
  var btn=document.getElementById('avatarBtn');
  btn.textContent=name.charAt(0).toUpperCase();
  btn.className='avatar-btn avatar-'+['coral','purple','teal'][hashCode(name)%3];
  initWords();render();
}

function showLogin(){
  document.getElementById('mainPage').classList.add('hidden');
  document.getElementById('loginPage').classList.remove('hidden');
  var users=getUsers(),list=document.getElementById('userList'),html='';
  users.forEach(function(u,i){
    var days=Object.keys(loadUserData(u.name).learnedDays).length;
    var avc=['avatar-coral','avatar-purple','avatar-teal'][i%3];
    html+='<div class="user-card" onclick="loginAs(\''+esc(u.name)+'\')">'+
      '<div class="user-avatar '+avc+'">'+u.name.charAt(0).toUpperCase()+'</div>'+
      '<div class="user-info"><div class="user-name">'+escHtml(u.name)+'</div>'+
      '<div class="user-meta">已学 '+days+' 天</div></div>'+
      '<div class="user-badge">进入</div></div>';
  });
  list.innerHTML=html||'<div style="text-align:center;color:var(--muted);padding:20px">还没有用户，点击下方创建</div>';
}

function hashCode(s){for(var i=0,h=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h);}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,'\\\'').replace(/"/g,'\\"');}
function escHtml(s){var d={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'};return s.replace(/[&<>"']/g,function(c){return d[c];});}

// ==================== 用户管理面板 ====================
function showUserPanel(){
  var users=getUsers(),html='';
  users.forEach(function(u,i){
    var days=Object.keys(loadUserData(u.name).learnedDays).length;
    var avc=['avatar-coral','avatar-purple','avatar-teal'][i%3];
    var active=currentUser===u.name?' active':'';
    html+='<div class="user-panel-item'+active+'">'+
      '<div class="up-avatar '+avc+'">'+u.name.charAt(0).toUpperCase()+'</div>'+
      '<div class="up-info"><div class="up-name">'+escHtml(u.name)+(active?' (当前)':'')+'</div>'+
      '<div class="up-desc">已学 '+days+' 天</div></div>'+
      '<div class="up-actions">'+
      (active?'':'<button class="up-btn up-btn-enter" onclick="switchTo(\''+esc(u.name)+'\')">切换</button>')+
      '<button class="up-btn up-btn-del" onclick="confirmDel(\''+esc(u.name)+'\')">删除</button></div></div>';
  });
  document.getElementById('userPanelList').innerHTML=html;
  document.getElementById('userOverlay').classList.remove('hidden');
}
function switchTo(name){
  hidePanel('userOverlay');
  loginAs(name);
  showToast('已切换到 '+name);
}
var delTarget=null;
function confirmDel(name){
  delTarget=name;
  document.getElementById('delTarget').textContent=name;
  document.getElementById('delPwd').value='';
  document.getElementById('delErr').classList.add('hidden');
  document.getElementById('delDialog').classList.remove('hidden');
}
function doDelete(){
  var pwd=document.getElementById('delPwd').value.trim();
  var users=getUsers();
  var u=users.find(function(x){return x.name===delTarget;});
  if(!u||u.pwd!==pwd){
    document.getElementById('delErr').textContent='密码错误';
    document.getElementById('delErr').classList.remove('hidden');
    return;
  }
  localStorage.removeItem(userStateKey(delTarget));
  users=users.filter(function(x){return x.name!==delTarget;});
  saveUsers(users);
  hideDialog('delDialog');
  hidePanel('userOverlay');
  if(currentUser===delTarget){
    currentUser=null;state=null;
    localStorage.removeItem(CUR_KEY);
    init();
  }
  showToast('已删除 '+delTarget);
}

// ==================== 创建用户 ====================
function showCreate(){
  document.getElementById('newName').value='';
  document.getElementById('newPwd').value='';
  document.getElementById('createErr').classList.add('hidden');
  document.getElementById('createDialog').classList.remove('hidden');
  setTimeout(function(){document.getElementById('newName').focus();},100);
}
function doCreate(){
  var name=document.getElementById('newName').value.trim();
  var pwd=document.getElementById('newPwd').value.trim();
  var e=document.getElementById('createErr');
  if(!name){e.textContent='请输入名字';e.classList.remove('hidden');return;}
  if(name.length>10){e.textContent='名字最多10个字';e.classList.remove('hidden');return;}
  if(pwd.length<2){e.textContent='密码至少2位';e.classList.remove('hidden');return;}
  if(pwd.length>20){e.textContent='密码最多20位';e.classList.remove('hidden');return;}
  var users=getUsers();
  if(users.find(function(u){return u.name===name;})){
    e.textContent='这个名字已被使用';e.classList.remove('hidden');return;
  }
  if(users.length>=10){e.textContent='最多10个用户';e.classList.remove('hidden');return;}
  users.push({name:name,pwd:pwd});
  saveUsers(users);
  hideDialog('createDialog');
  loginAs(name);
  showToast('欢迎，'+name+'!');
}

function hideDialog(id){delTarget=null;document.getElementById(id).classList.add('hidden');}
function hidePanel(id){document.getElementById(id).classList.add('hidden');}

// ==================== 单词逻辑 ====================
function save(){if(currentUser&&state)saveUserData(currentUser,state);}
function td(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function shuf(a){var s=a.slice();for(var i=s.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=s[i];s[i]=s[j];s[j]=t;}return s;}
function pick(){
  var today=td(),bank=W[state.range]||W.grade7;
  var seed=today+'-'+state.range,hash=0;
  for(var i=0;i<seed.length;i++){hash=((hash<<5)-hash)+seed.charCodeAt(i);hash|=0;}
  hash=Math.abs(hash);
  var pool=shuf(bank),start=hash%Math.max(1,pool.length-state.count);
  return pool.slice(start,start+state.count);
}
function initWords(){
  if(!state)state=mkDefaultState();
  words=pick();learned=[];
  var today=td();
  if(!state.learnedDays[today]){state.learnedDays[today]=true;save();}
}

function render(){
  var list=document.getElementById('wordList');
  list.innerHTML='';
  words.forEach(function(item,i){
    var l=learned.indexOf(i)!==-1;
    var card=document.createElement('div');
    card.className='word-card'+(l?' learned':'');
    card.style.animationDelay=(i*0.07)+'s';
    card.innerHTML='<div class="word-main">'+H(item.w)+'</div>'+
      '<div class="word-phonetic">'+H(item.p)+'</div>'+
      '<div class="word-zh">'+H(item.z)+'</div>'+
      '<div class="word-example">'+H(item.e)+'</div>'+
      '<div class="word-speaker" onclick="event.stopPropagation();spk(\''+item.w.replace(/'/g,'\\\'')+'\',this.closest(\'.word-card\'))">🔊</div>'+
      (l?'<div style="position:absolute;top:8px;right:52px;font-size:12px;opacity:0.5">✅</div>':'');
    card.addEventListener('click',function(){onCard(i,card);});
    list.appendChild(card);
  });
  updateProg();
}
function updateProg(){
  var n=learned.length;
  document.getElementById('progText').textContent=n+' / '+state.count;
  document.getElementById('progBar').style.width=state.count>0?(n/state.count*100)+'%':'0%';
}
function onCard(idx,el){spk(words[idx].w,el);if(learned.indexOf(idx)===-1){learned.push(idx);render();}}
function H(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function spk(word,el){
  if(!window.speechSynthesis){showToast('浏览器不支持发音');return;}
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=0.82;u.pitch=1.05;
  var voices=speechSynthesis.getVoices();
  var v=voices.find(function(x){return x.lang==='en-US'&&x.name.indexOf('Samantha')!==-1;})||voices.find(function(x){return x.lang==='en-US';})||voices.find(function(x){return x.lang.startsWith('en-');});
  if(v)u.voice=v;
  if(el){el.classList.add('pronouncing');u.onend=function(){el.classList.remove('pronouncing');};u.onerror=function(){el.classList.remove('pronouncing');};}
  speechSynthesis.speak(u);
}
function speakAll(){
  if(!words.length)return;var i=0;
  function next(){
    if(i>=words.length)return;
    var card=document.querySelectorAll('.word-card')[i];
    var u=new SpeechSynthesisUtterance(words[i].w);u.lang='en-US';u.rate=0.82;
    u.onend=function(){if(card)card.classList.remove('pronouncing');i++;setTimeout(next,350);};
    if(card)card.classList.add('pronouncing');
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }
  next();showToast('连续朗读中...');
}

// ==================== 设置面板 ====================
var curRange=null;
function openSettings(){
  curRange=state.range;
  var cg=document.getElementById('catGroups'),html='';
  CAT_GROUPS.forEach(function(g){
    var open=g.open?' open':'';
    html+='<div class="cat-group'+open+'" data-gid="'+g.id+'">';
    html+='<div class="cat-group-header" onclick="toggleGroup(this)"><span>'+g.icon+' '+g.name+'</span><span class="cat-group-arrow">▼</span></div>';
    html+='<div class="cat-group-body">';
    g.sub.forEach(function(s){
      var sel=curRange===s.key?' selected':'';
      html+='<div class="sub-option'+sel+'" data-key="'+s.key+'" onclick="selectCat(this,\''+g.id+'\')"><span class="sub-dot"></span><span class="sub-info"><span class="sub-name">'+s.name+'</span><span class="sub-desc">'+s.desc+'</span></span><span class="sub-check"></span></div>';
    });
    html+='</div></div>';
  });
  cg.innerHTML=html;
  var co=document.getElementById('countOpts'),ch='';
  for(var n=3;n<=8;n++){ch+='<div class="count-btn'+(state.count===n?' selected':'')+'" data-n="'+n+'" onclick="selectCount(this)">'+n+'</div>';}
  co.innerHTML=ch;
  document.getElementById('settingsOverlay').classList.remove('hidden');
}
function toggleGroup(header){header.parentElement.classList.toggle('open');}
function selectCat(el,gid){
  curRange=el.dataset.key;
  var g=document.querySelector('#catGroups .cat-group[data-gid="'+gid+'"]');
  g.querySelectorAll('.sub-option').forEach(function(s){s.classList.remove('selected');});
  el.classList.add('selected');
}
function selectCount(el){
  state.count=parseInt(el.dataset.n);
  document.querySelectorAll('#countOpts .count-btn').forEach(function(b){b.classList.remove('selected');});
  el.classList.add('selected');
}
function saveAndClose(){
  state.range=curRange;save();initWords();render();
  document.getElementById('settingsOverlay').classList.add('hidden');
  showToast('已更新词库');
}

// ==================== 统计 ====================
function openStats(){
  var today=td(),keys=Object.keys(state.learnedDays),total=keys.length,totalWords=total*state.count;
  var streak=0,todayDate=new Date();
  for(var i=0;i<365;i++){var d=new Date(todayDate);d.setDate(d.getDate()-i);var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(state.learnedDays[k])streak++;else if(i>0)break;}
  document.getElementById('statDays').textContent=total;
  document.getElementById('statWords').textContent=totalWords;
  document.getElementById('statStreak').textContent=streak;
  var cn='--';CAT_GROUPS.forEach(function(g){g.sub.forEach(function(s){if(s.key===state.range)cn=s.name;});});
  document.getElementById('statCat').textContent=cn;
  var em=document.getElementById('streakEmoji'),msg=document.getElementById('streakMsg');
  if(streak===0){em.textContent='😴';msg.textContent='今天还没开始学习哦';}
  else if(streak<3){em.textContent='🔥';msg.textContent='连续学习 '+streak+' 天，继续加油！';}
  else if(streak<7){em.textContent='🎉';msg.textContent='连续 '+streak+' 天！越来越棒！';}
  else{em.textContent='🏆';msg.textContent='连续 '+streak+' 天！学习冠军！';}
  document.getElementById('statsOverlay').classList.remove('hidden');
}

function refreshWords(){initWords();render();showToast('已刷新');}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(function(){t.classList.remove('show');},1800);}

if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices();};}
init();
</script>
