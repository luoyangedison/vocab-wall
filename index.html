<html lang="zh-CN">
<head>

<title>每日单词</title>
<style>
:root {
  --bg: #FFF5F5;
  --card-bg: #FFFFFF;
  --text: #2D3436;
  --sub: #636E72;
  --muted: #95A5A6;
  --coral: #FF6B6B;
  --yellow: #FFD93D;
  --green: #6BCB77;
  --teal: #4ECDC4;
  --purple: #A66CFF;
  --pink: #FF8C94;
  --shadow: 0 4px 24px rgba(255,107,107,0.12);
  --radius: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh; min-height: -webkit-fill-available;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}

.header-glow {
  position: fixed; top: 0; left: 0; right: 0; height: 6px;
  background: linear-gradient(90deg, var(--coral), var(--yellow), var(--green), var(--teal), var(--purple));
  z-index: 100;
}

.container { max-width: 430px; margin: 0 auto; padding: 20px 16px 40px; }

/* ---- 顶部 ---- */
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; margin-bottom: 6px; }
.logo { font-size: 20px; font-weight: 800; background: linear-gradient(135deg, var(--coral), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.top-btns { display: flex; gap: 8px; }
.icon-btn {
  width: 38px; height: 38px; border-radius: 50%; border: none;
  background: var(--card-bg); box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.icon-btn:active { transform: scale(0.9); }

/* ---- 进度 ---- */
.progress-section { margin: 6px 0 14px; }
.progress-label { font-size: 12px; color: var(--sub); margin-bottom: 3px; display: flex; justify-content: space-between; }
.progress-bar-wrap { height: 7px; border-radius: 10px; background: #F0E0E0; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 10px; background: linear-gradient(90deg, var(--green), var(--teal)); transition: width 0.5s ease; }

/* ---- 卡片 ---- */
.word-list { display: flex; flex-direction: column; gap: 10px; }
.word-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
  border-left: 5px solid transparent;
  animation: cardIn 0.4s ease both;
}
.word-card:active { transform: scale(0.97); }
.word-card:nth-child(8n+1) { border-left-color: var(--coral); }
.word-card:nth-child(8n+2) { border-left-color: var(--yellow); }
.word-card:nth-child(8n+3) { border-left-color: var(--green); }
.word-card:nth-child(8n+4) { border-left-color: var(--teal); }
.word-card:nth-child(8n+5) { border-left-color: var(--purple); }
.word-card:nth-child(8n+6) { border-left-color: var(--pink); }
.word-card:nth-child(8n+7) { border-left-color: #FF8C42; }
.word-card:nth-child(8n+0) { border-left-color: #45B7D1; }

.word-main { font-size: 24px; font-weight: 700; letter-spacing: 0.3px; }
.word-phonetic { font-size: 13px; color: var(--sub); margin: 2px 0 5px; font-family: 'SF Mono', Menlo, monospace; }
.word-zh { font-size: 14px; color: #555; margin-bottom: 3px; }
.word-example { font-size: 12px; color: var(--muted); font-style: italic; border-left: 2px solid var(--teal); padding-left: 8px; line-height: 1.5; }

.word-speaker {
  position: absolute; right: 12px; top: 12px;
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--coral), var(--pink));
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 14px; opacity: 0.85;
  transition: transform 0.1s;
}
.word-card:active .word-speaker { transform: scale(0.88); }

.word-card.pronouncing {
  border-color: var(--teal) !important;
  box-shadow: 0 0 0 4px rgba(78,205,196,0.25) !important;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---- 底部 ---- */
.bottom-bar { display: flex; gap: 10px; margin-top: 18px; }
.btn {
  flex: 1; padding: 13px 0; border: none; border-radius: 16px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn:active { transform: scale(0.95); }
.btn-primary {
  background: linear-gradient(135deg, var(--purple), var(--coral));
  color: white; box-shadow: 0 4px 16px rgba(166,108,255,0.3);
}
.btn-secondary {
  background: var(--card-bg); color: var(--text);
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}

/* ---- 弹窗通用 ---- */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 200; display: flex; align-items: flex-end;
  animation: fadeIn 0.2s;
}
.overlay.hidden { display: none; }
.panel {
  background: var(--card-bg);
  border-radius: 24px 24px 0 0;
  width: 100%; max-width: 430px; margin: 0 auto;
  padding: 20px 20px 40px;
  max-height: 85vh; overflow-y: auto;
  animation: slideUp 0.3s ease;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.12);
}
.panel-handle { width: 36px; height: 5px; border-radius: 4px; background: #ddd; margin: 0 auto 16px; }
.panel h3 { font-size: 17px; font-weight: 700; margin-bottom: 14px; }

@keyframes fadeIn { from { opacity: 0; } }
@keyframes slideUp { from { transform: translateY(100%); } }

/* ---- 设置面板 ---- */
.category-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
.cat-option {
  background: #FAFAFA; border: 2px solid #eee; border-radius: 14px;
  padding: 12px 14px; display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: border-color 0.2s, background 0.2s;
}
.cat-option:active { transform: scale(0.98); }
.cat-option.selected {
  border-color: var(--coral);
  background: linear-gradient(135deg, #FFF, #FFF5F5);
}
.cat-icon { font-size: 22px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: #F5F5F5; border-radius: 10px; flex-shrink: 0; }
.cat-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.cat-name { font-size: 14px; font-weight: 700; }
.cat-desc { font-size: 11px; color: var(--muted); }
.cat-check {
  width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ddd;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.cat-option.selected .cat-check { background: linear-gradient(135deg, var(--coral), var(--pink)); border-color: var(--coral); }
.cat-option.selected .cat-check::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }

.count-opts { display: flex; gap: 6px; }
.count-btn {
  flex: 1; padding: 10px 0; border: 2px solid #eee; border-radius: 12px;
  background: #FAFAFA; font-size: 15px; font-weight: 700; cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.count-btn.selected { border-color: var(--coral); background: #FFF5F5; color: var(--coral); }
.count-btn:active { transform: scale(0.95); }

/* ---- 统计面板 ---- */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.stat-card {
  background: #FAFAFA; border-radius: 14px; padding: 14px 10px; text-align: center;
  border-top: 3px solid var(--coral);
}
.stat-card:nth-child(1) { border-top-color: var(--coral); }
.stat-card:nth-child(2) { border-top-color: var(--teal); }
.stat-card:nth-child(3) { border-top-color: var(--yellow); }
.stat-card:nth-child(4) { border-top-color: var(--purple); }
.stat-val { font-size: 26px; font-weight: 800; background: linear-gradient(135deg, var(--coral), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }
.streak-section { text-align: center; padding: 10px 0; }
.streak-emoji { font-size: 36px; }
.streak-msg { font-size: 13px; color: var(--sub); margin-top: 4px; }

/* ---- Toast ---- */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: #2D3436; color: white; padding: 10px 22px; border-radius: 20px;
  font-size: 13px; z-index: 300; opacity: 0; transition: opacity 0.3s;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* ---- 引导 ---- */
.guide-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  flex-direction: column; padding: 24px;
}
.guide-overlay.hidden { display: none; }
.guide-card {
  background: var(--card-bg); border-radius: 24px;
  padding: 28px 24px; max-width: 330px; text-align: center;
  animation: cardIn 0.4s ease;
}
.guide-card h4 { font-size: 20px; margin-bottom: 12px; }
.guide-card .step { display: flex; align-items: flex-start; gap: 8px; margin: 8px 0; text-align: left; font-size: 13px; color: var(--sub); }
.guide-card .step-n { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--purple); color: white; font-size: 12px; font-weight: 700; flex-shrink: 0; }
.guide-card .hl { color: var(--coral); font-weight: 700; }
</style>
</head>
<body>

<div class="header-glow"></div>

<div class="container">
  <div class="top-bar">
    <span class="logo">📖 每日词汇</span>
    <div class="top-btns">
      <button class="icon-btn" onclick="openStats()">📊</button>
      <button class="icon-btn" onclick="openSettings()">⚙️</button>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-label"><span>今日已学</span><span id="progText">0 / 3</span></div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progBar" style="width:0%"></div></div>
  </div>

  <div class="word-list" id="wordList"></div>

  <div class="bottom-bar">
    <button class="btn btn-secondary" onclick="refreshWords()">🔄 换一批</button>
    <button class="btn btn-primary" onclick="speakAll()">🔊 连续朗读</button>
  </div>
</div>

<!-- 设置面板 -->
<div class="overlay hidden" id="settingsOverlay" onclick="closePanel(event,'settingsOverlay')">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-handle"></div>
    <h3>⚙️ 词库设置</h3>
    <div class="category-list" id="catList"></div>
    <h3>每日词数</h3>
    <div class="count-opts" id="countOpts"></div>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button class="btn btn-secondary" onclick="closePanel(event,'settingsOverlay')">取消</button>
      <button class="btn btn-primary" onclick="saveAndClose()">保存</button>
    </div>
  </div>
</div>

<!-- 统计面板 -->
<div class="overlay hidden" id="statsOverlay" onclick="closePanel(event,'statsOverlay')">
  <div class="panel" onclick="event.stopPropagation()">
    <div class="panel-handle"></div>
    <h3>📊 学习记录</h3>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" id="statDays">0</div><div class="stat-label">已学天数</div></div>
      <div class="stat-card"><div class="stat-val" id="statWords">0</div><div class="stat-label">累计单词</div></div>
      <div class="stat-card"><div class="stat-val" id="statStreak">0</div><div class="stat-label">连续打卡</div></div>
      <div class="stat-card"><div class="stat-val" id="statCat">--</div><div class="stat-label">当前分类</div></div>
    </div>
    <div class="streak-section"><div class="streak-emoji" id="streakEmoji">😴</div><div class="streak-msg" id="streakMsg">今天还没开始学习哦</div></div>
    <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="closePanel(event,'statsOverlay')">关闭</button>
  </div>
</div>

<!-- 引导 -->
<div class="guide-overlay hidden" id="guideOverlay">
  <div class="guide-card">
    <h4>🎉 添加到桌面</h4>
    <div class="step"><span class="step-n">1</span>Safari 打开本页面</div>
    <div class="step"><span class="step-n">2</span>点底部中间 <span class="hl">分享按钮</span></div>
    <div class="step"><span class="step-n">3</span>滑动找到 <span class="hl">「添加到主屏幕」</span></div>
    <div class="step"><span class="step-n">4</span>点右上角「添加」</div>
    <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="document.getElementById('guideOverlay').classList.add('hidden');localStorage.setItem('vw_guide','1')">知道了</button>
  </div>
</div>

<div class="toast" id="toast"></div>

};var CAT_META={grade7:{name:'初一英语',icon:'📚',desc:'七年级课标基础词汇 (80词)'},grade8:{name:'初二英语',icon:'📖',desc:'八年级课标进阶词汇 (73词)'},grade9:{name:'初三英语',icon:'🎓',desc:'九年级课标核心词汇 (72词)'},daily:{name:'日常生活',icon:'🏠',desc:'常见形容词、名词、动词 (51词)'},ai:{name:'AI科技',icon:'🤖',desc:'机器学习、AI领域术语 (40词)'},business:{name:'商务英语',icon:'💼',desc:'职场、金融、管理词汇 (41词)'},travel:{name:'旅行出行',icon:'✈️',desc:'旅行、交通、住宿词汇 (34词)'},health:{name:'医疗健康',icon:'🏥',desc:'医学、健康、保健词汇 (38词)'}};

// ==================== 状态 ====================
var STORAGE_KEY='vw_v2', state={range:'grade7',count:3,learnedDays:{}};
(function loadState(){try{var r=localStorage.getItem(STORAGE_KEY);if(r){var p=JSON.parse(r);state.range=p.range||'grade7';state.count=p.count||3;state.learnedDays=p.learnedDays||{};}}catch(e){}})();
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function getToday(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function shuffleArr(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function pickWords(){
  var today=getToday(),bank=WORD_DB[state.range]||WORD_DB.grade7;
  var seed=today+'-'+state.range,hash=0;
  for(var i=0;i<seed.length;i++){hash=((hash<<5)-hash)+seed.charCodeAt(i);hash|=0;}
  hash=Math.abs(hash);
  var pool=shuffleArr(bank),start=hash%Math.max(1,pool.length-state.count);
  return pool.slice(start,start+state.count);
}

var words=[],learned=[];

function initWords(){
  words=pickWords();
  learned=[];
  // mark today as visited
  var today=getToday();
  if(!state.learnedDays[today]){state.learnedDays[today]=true;saveState();}
}

// ==================== 渲染 ====================
function render(){
  var list=document.getElementById('wordList');
  list.innerHTML='';
  words.forEach(function(item,i){
    var l=learned.indexOf(i)!==-1;
    var card=document.createElement('div');
    card.className='word-card'+(l?' learned':'');
    card.style.animationDelay=(i*0.07)+'s';
    card.innerHTML='<div class="word-main">'+e(item.w)+'</div>'+
      '<div class="word-phonetic">'+e(item.p)+'</div>'+
      '<div class="word-zh">'+e(item.z)+'</div>'+
      '<div class="word-example">'+e(item.e)+'</div>'+
      '<div class="word-speaker" onclick="event.stopPropagation();speak(\''+item.w.replace(/'/g,"\\'")+'\',this.closest(\'.word-card\'))">🔊</div>'+
      (l?'<div style="position:absolute;top:8px;right:52px;font-size:12px;opacity:0.5">✅</div>':'');
    card.addEventListener('click',function(){onCard(i,card);});
    list.appendChild(card);
  });
  updateProg();
}

function updateProg(){
  var n=learned.length;
  document.getElementById('progText').textContent=n+' / '+state.count;
  document.getElementById('progBar').style.width=state.count>0?(n/state.count*100)+'%':'0%';
}

function onCard(idx,el){
  speak(words[idx].w,el);
  if(learned.indexOf(idx)===-1){learned.push(idx);render();}
}

// ==================== 发音 ====================
function speak(word,el){
  if(!window.speechSynthesis){showToast('浏览器不支持发音');return;}
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(word);
  u.lang='en-US';u.rate=0.82;u.pitch=1.05;
  var voices=speechSynthesis.getVoices();
  var v=voices.find(function(x){return x.lang==='en-US'&&x.name.indexOf('Samantha')!==-1;})||voices.find(function(x){return x.lang==='en-US';})||voices.find(function(x){return x.lang.startsWith('en-');});
  if(v)u.voice=v;
  if(el){el.classList.add('pronouncing');u.onend=function(){el.classList.remove('pronouncing');};u.onerror=function(){el.classList.remove('pronouncing');};}
  speechSynthesis.speak(u);
}

function speakAll(){
  if(!words.length)return;
  var i=0;
  function next(){
    if(i>=words.length)return;
    var card=document.querySelectorAll('.word-card')[i];
    var u=new SpeechSynthesisUtterance(words[i].w);
    u.lang='en-US';u.rate=0.82;
    u.onend=function(){if(card)card.classList.remove('pronouncing');i++;setTimeout(next,350);};
    if(card)card.classList.add('pronouncing');
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }
  next();showToast('连续朗读中...');
}

// ==================== 设置 ====================
function openSettings(){
  var cl=document.getElementById('catList'),html='';
  Object.keys(CATEGORY_ORDER).forEach(function(k){
    var m=CAT_META[k];if(!m)return;
    html+='<div class="cat-option'+(state.range===k?' selected':'')+'" data-key="'+k+'"><span class="cat-icon">'+m.icon+'</span><span class="cat-info"><span class="cat-name">'+m.name+'</span><span class="cat-desc">'+m.desc+'</span></span><span class="cat-check"></span></div>';
  });
  cl.innerHTML=html;
  cl.querySelectorAll('.cat-option').forEach(function(el){el.addEventListener('click',function(){state.range=el.dataset.key;openSettings();});});
  var co=document.getElementById('countOpts'),ch='';
  for(var n=3;n<=8;n++){ch+='<div class="count-btn'+(state.count===n?' selected':'')+'" data-n="'+n+'">'+n+'</div>';}
  co.innerHTML=ch;
  co.querySelectorAll('.count-btn').forEach(function(el){el.addEventListener('click',function(){state.count=parseInt(el.dataset.n);openSettings();});});
  document.getElementById('settingsOverlay').classList.remove('hidden');
}

function saveAndClose(){
  saveState();initWords();render();
  document.getElementById('settingsOverlay').classList.add('hidden');
  showToast('已更新词库 ✨');
}

function closePanel(e,id){if(!e||e.target===document.getElementById(id)){document.getElementById(id).classList.add('hidden');}}

// ==================== 统计 ====================
function openStats(){
  var today=getToday(),keys=Object.keys(state.learnedDays),total=keys.length,totalWords=total*state.count;
  var streak=0,td=new Date();
  for(var i=0;i<365;i++){var d=new Date(td);d.setDate(d.getDate()-i);var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(state.learnedDays[k])streak++;else if(i>0)break;}
  document.getElementById('statDays').textContent=total;
  document.getElementById('statWords').textContent=totalWords;
  document.getElementById('statStreak').textContent=streak;
  var cm=CAT_META[state.range];document.getElementById('statCat').textContent=cm?cm.name:'--';
  var em=document.getElementById('streakEmoji'),msg=document.getElementById('streakMsg');
  if(streak===0){em.textContent='😴';msg.textContent='今天还没开始学习哦';}
  else if(streak<3){em.textContent='🔥';msg.textContent='连续学习 '+streak+' 天，继续加油！';}
  else if(streak<7){em.textContent='🎉';msg.textContent='连续 '+streak+' 天！越来越棒！';}
  else{em.textContent='🏆';msg.textContent='连续 '+streak+' 天！学习冠军！';}
  document.getElementById('statsOverlay').classList.remove('hidden');
}

// ==================== 其他 ====================
function refreshWords(){initWords();render();showToast('已刷新 ✨');}
function e(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function showToast(msg){
  var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(function(){t.classList.remove('show');},1800);
}

var CATEGORY_ORDER=['grade7','grade8','grade9','daily','ai','business','travel','health'];

// ==================== 初始化 ====================
(function init(){
  if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices();};}
  initWords();
  render();
  if(!localStorage.getItem('vw_guide')){setTimeout(function(){document.getElementById('guideOverlay').classList.remove('hidden');},500);}
})();
</script>
