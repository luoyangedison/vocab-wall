<title>每日单词</title>
<style>
:root{--bg:#F7F8FC;--card-bg:#FFFFFF;--text:#1A1A2E;--sub:#555770;--muted:#8E90A6;--accent:#667EEA;--accent2:#764BA2;--success:#0ECD9D;--warm:#F5A623;--shadow:0 2px 16px rgba(26,26,46,0.06);--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;padding-bottom:env(safe-area-inset-bottom,20px)}
.container{max-width:430px;margin:0 auto;padding:16px 16px 40px}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 0 12px;border-bottom:1px solid #eee;margin-bottom:12px;position:relative;z-index:250}
.logo{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.user-area{display:flex;align-items:center;gap:6px}
.user-btn{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;border:1.5px solid #E4E6EE;background:#FFF;color:var(--sub);font-size:13px;font-weight:500;cursor:pointer;transition:0.15s}
.user-btn:active{background:#F0F1F8;transform:scale(0.97)}
.user-btn .avatar{width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.action-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.action-btns{display:flex;gap:6px}
.text-btn{display:flex;align-items:center;gap:3px;padding:6px 14px;border-radius:22px;border:1.5px solid #E4E6EE;background:#FFF;color:var(--sub);font-size:12px;font-weight:500;cursor:pointer;transition:0.15s}
.text-btn:active{background:#F0F1F8}
.text-btn .btn-icon{font-size:14px}
.progress-section{margin-bottom:10px;display:flex;align-items:center;gap:10px}
.progress-bar-wrap{flex:1;height:6px;border-radius:8px;background:#E8E9F0;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 0.5s ease}
.progress-label{font-size:11px;color:var(--muted);white-space:nowrap;min-width:36px;text-align:right}
.word-list{display:flex;flex-direction:column;gap:10px}
.word-card{background:var(--card-bg);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);cursor:pointer;position:relative;border:1.5px solid transparent;animation:cardIn 0.4s ease both;transition:border-color 0.2s}
.word-card:active{transform:scale(0.97)}
.word-card.learned{opacity:0.55}
.word-main{font-size:22px;font-weight:700;color:var(--text);letter-spacing:0.2px}
.word-phonetic{font-size:13px;color:var(--sub);margin:2px 0 4px;font-family:'SF Mono',Menlo,monospace}
.word-zh{font-size:14px;color:#444;margin-bottom:4px}
.word-example{font-size:12px;color:var(--muted);font-style:italic;border-left:3px solid var(--accent);padding-left:8px;line-height:1.5;margin-top:4px}
.word-speaker{position:absolute;right:12px;top:12px;width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:white;font-size:15px;opacity:0.9;transition:0.1s;box-shadow:0 2px 8px rgba(102,126,234,0.3)}
.word-card:active .word-speaker{transform:scale(0.88)}
.word-card.pronouncing{border-color:var(--accent)!important;box-shadow:0 0 0 4px rgba(102,126,234,0.15)!important}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bottom-bar{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:13px 0;border:none;border-radius:14px;font-size:14px;font-weight:600;cursor:pointer;transition:0.15s}
.btn:active{transform:scale(0.95)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;box-shadow:0 4px 14px rgba(102,126,234,0.3)}
.btn-secondary{background:var(--card-bg);color:var(--text);box-shadow:var(--shadow);border:1.5px solid #E8E9F0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:flex-end;animation:fadeIn 0.2s}
.overlay.hidden{display:none}
.panel{background:var(--card-bg);border-radius:24px 24px 0 0;width:100%;max-width:430px;margin:0 auto;padding:20px 20px 40px;max-height:85vh;overflow-y:auto;animation:slideUp 0.3s ease;box-shadow:0 -8px 40px rgba(0,0,0,0.12)}
.panel-handle{width:36px;height:5px;border-radius:4px;background:#ddd;margin:0 auto 16px}
.panel h3{font-size:17px;font-weight:700;margin-bottom:14px;color:var(--text)}
.cat-group{margin-bottom:16px}
.cat-group-header{display:flex;align-items:center;gap:8px;padding:12px 14px;background:#F7F8FC;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;user-select:none;-webkit-user-select:none;transition:0.2s;color:var(--text)}
.cat-group-header:active{background:#EEEFF5}
.cat-group-arrow{margin-left:auto;font-size:12px;transition:0.25s;color:var(--sub)}
.cat-group.open .cat-group-arrow{transform:rotate(180deg)}
.cat-group-body{display:none;flex-direction:column;gap:6px;padding:8px 0 0 6px}
.cat-group.open .cat-group-body{display:flex}
.sub-option{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;background:#FFF;border:2px solid #eee;cursor:pointer;transition:0.2s}
.sub-option:active{transform:scale(0.98)}
.sub-option.selected{border-color:var(--accent);background:linear-gradient(135deg,#FFF,#F0F3FF)}
.sub-dot{width:8px;height:8px;border-radius:50%;background:#ddd;flex-shrink:0}
.sub-option.selected .sub-dot{background:var(--accent)}
.sub-info{flex:1}
.sub-name{font-size:13px;font-weight:600;color:var(--text)}
.sub-desc{font-size:11px;color:var(--muted)}
.sub-check{width:20px;height:20px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sub-option.selected .sub-check{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent)}
.sub-option.selected .sub-check::after{content:'¹3';color:white;font-size:11px;font-weight:700}
.count-opts{display:flex;gap:6px;margin-bottom:18px}
.count-btn{flex:1;padding:10px 0;border:2px solid #eee;border-radius:12px;background:#FAFAFC;font-size:15px;font-weight:700;cursor:pointer;transition:0.2s;color:var(--text)}
.count-btn.selected{border-color:var(--accent);background:#F0F3FF;color:var(--accent)}
.count-btn:active{transform:scale(0.95)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.stat-card{background:#F7F8FC;border-radius:14px;padding:14px 10px;text-align:center}
.stat-card:nth-child(1) .stat-val{color:var(--accent)}
.stat-card:nth-child(2) .stat-val{color:var(--accent2)}
.stat-card:nth-child(3) .stat-val{color:var(--success)}
.stat-card:nth-child(4) .stat-val{color:var(--warm)}
.stat-val{font-size:26px;font-weight:800}
.stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.streak-section{text-align:center;padding:8px 0}
.streak-emoji{font-size:36px}
.streak-msg{font-size:13px;color:var(--sub);margin-top:4px}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1A1A2E;color:white;padding:10px 22px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.input-group{margin-bottom:14px}
.input-group label{display:block;font-size:13px;font-weight:600;color:var(--sub);margin-bottom:4px}
.input-group input{width:100%;padding:12px 14px;border:2px solid #E4E6EE;border-radius:12px;font-size:15px;outline:none;transition:0.2s;background:#FAFAFC}
.input-group input:focus{border-color:var(--accent)}
.guide-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:24px}
.guide-overlay.hidden{display:none}
.guide-card{background:var(--card-bg);border-radius:24px;padding:28px 24px;max-width:330px;text-align:center;animation:cardIn 0.4s ease}
.guide-card h4{font-size:20px;margin-bottom:12px}
.guide-card .step{display:flex;align-items:flex-start;gap:8px;margin:8px 0;text-align:left;font-size:13px;color:var(--sub)}
.guide-card .step-n{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--accent);color:white;font-size:12px;font-weight:700;flex-shrink:0}
.guide-card .hl{color:var(--accent);font-weight:700}
@keyframes fadeIn{from{opacity:0}}
@keyframes slideUp{from{transform:translateY(100%)}}
</style>
</head>
<body>
<div class="container">
<div class="top-bar">
<span class="logo">每日单词</span>
<div class="user-area">
<button class="user-btn" onclick="openUserPanel()">
<span class="avatar" id="userAvatar">?</span>
<span id="userNameDisplay" style="display:none"></span><span id="userPlaceholder">点击登录</span>
</button>
</div>
</div>
<div class="action-row">
<div class="action-btns">
<button class="text-btn" onclick="openSettings()"><span class="btn-icon">⚙</span> 词库</button>
<button class="text-btn" onclick="openStats()"><span class="btn-icon">📊</span> 统计</button>
</div>
</div>
<div class="progress-section">
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progBar" style="width:0%"></div></div>
<div class="progress-label" id="progText">0/3</div>
</div>
<div class="word-list" id="wordList"></div>
<div class="bottom-bar">
<button class="btn btn-secondary" onclick="refreshWords()">换一批</button>
<button class="btn btn-primary" onclick="speakAll()">连续朗读</button>
</div>
</div>

<!-- 设置面板 -->
<div class="overlay hidden" id="settingsOverlay" onclick="closePanel(event,'settingsOverlay')">
<div class="panel" onclick="event.stopPropagation()">
<div class="panel-handle"></div>
<h3>词库设置</h3>
<div id="catGroups"></div>
<h3 style="margin-top:8px">每日词数</h3>
<div class="count-opts" id="countOpts"></div>
<div style="margin-top:16px;display:flex;gap:10px">
<button class="btn btn-secondary" onclick="closePanel(event,'settingsOverlay')">取消</button>
<button class="btn btn-primary" onclick="saveAndClose()">保存</button>
</div>
</div>
</div>

<!-- 统计面板 -->
<div class="overlay hidden" id="statsOverlay" onclick="closePanel(event,'statsOverlay')">
<div class="panel" onclick="event.stopPropagation()">
<div class="panel-handle"></div>
<h3>学习记录</h3>
<div class="stats-grid">
<div class="stat-card"><div class="stat-val" id="statDays">0</div><div class="stat-label">学习天数</div></div>
<div class="stat-card"><div class="stat-val" id="statWords">0</div><div class="stat-label">累计单词</div></div>
<div class="stat-card"><div class="stat-val" id="statStreak">0</div><div class="stat-label">连续打卡</div></div>
<div class="stat-card"><div class="stat-val" id="statCat">--</div><div class="stat-label">当前词库</div></div>
</div>
<div class="streak-section"><div class="streak-emoji" id="streakEmoji">-</div><div class="streak-msg" id="streakMsg"></div></div>
<button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="closePanel(event,'statsOverlay')">关闭</button>
</div>
</div>

<!-- 用户面板 -->
<div class="overlay hidden" id="userOverlay" onclick="closePanel(event,'userOverlay')">
<div class="panel" onclick="event.stopPropagation()">
<div class="panel-handle"></div>
<h3>用户</h3>
<div id="userPanel"></div>
</div>
</div>

<!-- 引导 -->
<div class="guide-overlay hidden" id="guideOverlay">
<div class="guide-card">
<h4>添加到桌面</h4>
<div class="step"><span class="step-n">1</span>Safari 打开本页面</div>
<div class="step"><span class="step-n">2</span>点底部中间 <span class="hl">分享按钮</span></div>
<div class="step"><span class="step-n">3</span>滑动找到 <span class="hl">「添加到主屏幕」</span></div>
<div class="step"><span class="step-n">4</span>点右上角「添加」</div>
<button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="document.getElementById('guideOverlay').classList.add('hidden');localStorage.setItem('vw_g4','1')">知道了</button>
</div>
</div>
<div class="toast" id="toast"></div>

function getActiveUser(){return localStorage.getItem(ACTIVE_USER_KEY)||'';}
function setActiveUser(n){localStorage.setItem(ACTIVE_USER_KEY,n);}

function hashPass(pw){
  var h=0;for(var i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h|=0;}
  return 'V'+Math.abs(h).toString(36);
}

function loginUser(name,pw){
  if(!name||!pw)return showToast('请输入名字和密码');
  var users=loadUsers();
  if(!users[name])return showToast('用户不存在，请先创建');
  if(users[name].pw!==hashPass(pw))return showToast('密码错误');
  setActiveUser(name);
  checkUserFlow();
  showToast('欢迎回来，'+name+' 👋');
}

function createUser(name,pw){
  if(!name||!pw)return showToast('请输入名字和密码');
  if(name.length>20)return showToast('名字太长，20字以内');
  var users=loadUsers();
  if(users[name])return showToast('该名字已存在');
  users[name]={pw:hashPass(pw),state:{range:'grade7',count:3,learnedDays:{}}};
  saveUsers(users);
  setActiveUser(name);
  checkUserFlow();
  showToast('创建成功，欢迎 '+name+' 🎉');
}

function deleteUser(name){
  var users=loadUsers();
  delete users[name];saveUsers(users);
  if(getActiveUser()===name)setActiveUser('');
  showToast('已删除用户：'+name);
}

function getState(){
  var au=getActiveUser();if(!au)return null;
  var users=loadUsers();if(!users[au])return null;
  if(!users[au].state)users[au].state={range:'grade7',count:3,learnedDays:{}};
  return users[au].state;
}
function saveState(st){
  var au=getActiveUser();if(!au)return;
  var users=loadUsers();if(!users[au])return;
  users[au].state=st;saveUsers(users);
}
function td(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function shuf(a){var s=a.slice();for(var i=s.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=s[i];s[i]=s[j];s[j]=t;}return s;}

function pick(){
  var st=getState();if(!st)return[];
  var bank=W[st.range]||W.grade7;
  var today=td(),seed=today+'-'+st.range,hash=0;
  for(var i=0;i<seed.length;i++){hash=((hash<<5)-hash)+seed.charCodeAt(i);hash|=0;}
  hash=Math.abs(hash);
  var pool=shuf(bank),start=hash%Math.max(1,pool.length-st.count);
  return pool.slice(start,start+st.count);
}

var words=[],learned=[];

function initWords(){
  var st=getState();if(!st)return;
  words=pick();learned=[];
  var today=td();
  if(!st.learnedDays[today]){st.learnedDays[today]=true;saveState(st);}
}

// ==================== 渲染 ====================
function render(){
  var list=document.getElementById('wordList');list.innerHTML='';
  words.forEach(function(item,i){
    var card=document.createElement('div');
    card.className='word-card';card.style.animationDelay=(i*0.07)+'s';
    card.innerHTML='<div class="word-main">'+H(item.w)+'</div>'+
      '<div class="word-phonetic">'+H(item.p)+'</div>'+
      '<div class="word-zh">'+H(item.z)+'</div>'+
      '<div class="word-example">'+H(item.e)+'</div>'+
      '<div class="word-speaker" onclick="event.stopPropagation();spk(\''+item.w.replace(/'/g,"\\'")+'\',this.closest(\'.word-card\'))">🔊</div>';
    card.addEventListener('click',function(){onCard(i,card);});
    list.appendChild(card);
  });
  updateProg();
}
function updateProg(){
  var st=getState();if(!st)return;
  var n=learned.length;
  document.getElementById('progText').textContent=n+' / '+st.count;
  document.getElementById('progBar').style.width=st.count>0?(n/st.count*100)+'%':'0%';
}
function onCard(idx,el){
  spk(words[idx].w,el);
  if(learned.indexOf(idx)===-1){learned.push(idx);render();}
}
function H(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ==================== 发音 ====================
function spk(word,el){
  if(!window.speechSynthesis){showToast('浏览器不支持发音');return;}
  speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(word);u.lang='en-US';u.rate=0.82;u.pitch=1.05;
  var voices=speechSynthesis.getVoices();
  var v=voices.find(function(x){return x.lang==='en-US'&&x.name.indexOf('Samantha')!==-1;})||voices.find(function(x){return x.lang==='en-US';})||voices.find(function(x){return x.lang.startsWith('en-');});
  if(v)u.voice=v;
  if(el){el.classList.add('pronouncing');u.onend=function(){el.classList.remove('pronouncing');};u.onerror=function(){el.classList.remove('pronouncing');};}
  speechSynthesis.speak(u);
}
function speakAll(){
  if(!words.length)return;var i=0;
  function next(){
    if(i>=words.length)return;
    var card=document.querySelectorAll('.word-card')[i];
    var u=new SpeechSynthesisUtterance(words[i].w);u.lang='en-US';u.rate=0.82;
    u.onend=function(){if(card)card.classList.remove('pronouncing');i++;setTimeout(next,350);};
    if(card)card.classList.add('pronouncing');
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }
  next();showToast('连续朗读中...');
}

// ==================== 设置面板 ====================
var curRange='';
function openSettings(){
  var st=getState();if(!st)return;
  curRange=st.range;
  var cg=document.getElementById('catGroups'),html='';
  CAT_GROUPS.forEach(function(g){
    var open=g.open?' open':'';
    html+='<div class="cat-group'+open+'" data-gid="'+g.id+'">';
    html+='<div class="cat-group-header" onclick="toggleGroup(this)"><span>'+g.icon+' '+g.name+'</span><span class="cat-group-arrow">▼</span></div>';
    html+='<div class="cat-group-body">';
    g.sub.forEach(function(s){
      var sel=curRange===s.key?' selected':'';
      html+='<div class="sub-option'+sel+'" data-key="'+s.key+'" onclick="selectCat(this,\''+g.id+'\')"><span class="sub-dot"></span><span class="sub-info"><span class="sub-name">'+s.name+'</span><span class="sub-desc">'+s.desc+'</span></span><span class="sub-check"></span></div>';
    });
    html+='</div></div>';
  });
  cg.innerHTML=html;
  var co=document.getElementById('countOpts'),ch='';
  for(var n=3;n<=8;n++){ch+='<div class="count-btn'+(st.count===n?' selected':'')+'" data-n="'+n+'" onclick="selectCount(this)">'+n+'</div>';}
  co.innerHTML=ch;
  document.getElementById('settingsOverlay').classList.remove('hidden');
}
function toggleGroup(header){header.parentElement.classList.toggle('open');}
function selectCat(el,gid){
  curRange=el.dataset.key;
  var g=document.querySelector('#catGroups .cat-group[data-gid="'+gid+'"]');
  g.querySelectorAll('.sub-option').forEach(function(s){s.classList.remove('selected');});
  el.classList.add('selected');
}
function selectCount(el){
  var n=parseInt(el.dataset.n);
  document.querySelectorAll('#countOpts .count-btn').forEach(function(b){b.classList.remove('selected');});
  el.classList.add('selected');
}
function saveAndClose(){
  var st=getState();if(!st)return;
  st.range=curRange;saveState(st);initWords();render();
  document.getElementById('settingsOverlay').classList.add('hidden');
  showToast('已更新词库 ✨');
}
function closePanel(e,id){if(!e||e.target===document.getElementById(id)){document.getElementById(id).classList.add('hidden');}}

// ==================== 统计 ====================
function openStats(){
  var st=getState();if(!st)return;
  var today=td(),keys=Object.keys(st.learnedDays),total=keys.length,totalWords=total*st.count;
  var streak=0,todayDate=new Date();
  for(var i=0;i<365;i++){var d=new Date(todayDate);d.setDate(d.getDate()-i);var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(st.learnedDays[k])streak++;else if(i>0)break;}
  document.getElementById('statDays').textContent=total;
  document.getElementById('statWords').textContent=totalWords;
  document.getElementById('statStreak').textContent=streak;
  var cn='--';CAT_GROUPS.forEach(function(g){g.sub.forEach(function(s){if(s.key===st.range)cn=s.name;});});
  document.getElementById('statCat').textContent=cn;
  var em=document.getElementById('streakEmoji'),msg=document.getElementById('streakMsg');
  if(streak===0){em.textContent='😴';msg.textContent='今天还没开始学习哦';}
  else if(streak<3){em.textContent='🔥';msg.textContent='连续学习 '+streak+' 天，继续加油！';}
  else if(streak<7){em.textContent='🎉';msg.textContent='连续 '+streak+' 天！越来越棒！';}
  else{em.textContent='🏆';msg.textContent='连续 '+streak+' 天！学习冠军！';}
  document.getElementById('statsOverlay').classList.remove('hidden');
}

// ==================== 用户面板 ====================
function openUserPanel(){
  try{
    var au=getActiveUser();
    var panel=document.getElementById('userPanel');
    if(au){
      panel.innerHTML='<div class="user-card-name">👤 '+H(au)+'</div>'+
        '<button class="user-act-btn" onclick="switchToUser()">🔄 切换用户</button>'+
        '<button class="user-act-btn del" onclick="if(confirm(\'确定要删除 \'+au+'\' 吗？此操作不可恢复。\')){deleteUser(\''+au.replace(/'/g,"\\'")+'\');openUserPanel();if(!getActiveUser())checkUserFlow();}">🗑 删除此用户</button>';
    } else if(Object.keys(loadUsers()).length===0){
      showLoginForm();
    } else {
      switchToUser();
    }
    document.getElementById('userOverlay').classList.remove('hidden');
  }catch(e){
    showToast('出错：'+e.message);
  }
}
function switchToUser(){
  var users=loadUsers(),names=Object.keys(users);
  var html='<div style="font-size:13px;color:var(--muted);margin-bottom:10px">已有用户，点击即可切换：</div>';
  names.forEach(function(n){html+='<div class="user-switch-item" onclick="setActiveUser(\''+n.replace(/'/g,"\\'")+'\');loginQuick()">👤 '+H(n)+'</div>';});
  html+='<div class="user-switch-item new" onclick="showLoginForm()">➕ 新建用户</div>';
  var panel=document.getElementById('userPanel');
  panel.innerHTML=html;
}
function loginQuick(){
  checkUserFlow();showToast('已切换');
  document.getElementById('userOverlay').classList.add('hidden');
}
function showLoginForm(){
  var panel=document.getElementById('userPanel');
  panel.innerHTML='<div class="login-form"><input class="login-input" id="loginName" placeholder="输入名字"><input class="login-input" id="loginPw" type="password" placeholder="输入密码"><div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-primary" style="flex:1" onclick="var n=document.getElementById(\'loginName\').value.trim(),p=document.getElementById(\'loginPw\').value;if(!n)return showToast(\'请输入名字\');var users=loadUsers();if(users[n]){loginUser(n,p);document.getElementById(\'userOverlay\').classList.add(\'hidden\');}else{createUser(n,p);document.getElementById(\'userOverlay\').classList.add(\'hidden\');}">确认</button><button class="btn btn-secondary" style="flex:1" onclick="switchToUser()">返回</button></div></div>';
}

// ==================== 用户流程 ====================
function checkUserFlow(){
  var au=getActiveUser();
  if(au){
    var users=loadUsers();
    if(users[au]){
      var nd=document.getElementById('userNameDisplay');
      nd.textContent=au;nd.style.display='';
      var ph=document.getElementById('userPlaceholder');if(ph)ph.style.display='none';
      initWords();render();
      return;
    }
  }
  var nd=document.getElementById('userNameDisplay');if(nd)nd.style.display='none';
  var ph=document.getElementById('userPlaceholder');if(ph)ph.style.display='';
  words=[];document.getElementById('wordList').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">请先创建或选择用户</div>';
  document.getElementById('progText').textContent='0 / 0';
  document.getElementById('progBar').style.width='0%';
  openUserPanel();
}

// ==================== 工具 ====================
function refreshWords(){initWords();render();showToast('已刷新 ✨');}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(function(){t.classList.remove('show');},1800);}

// ==================== 初始化 ====================
(function init(){
  if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=function(){speechSynthesis.getVoices();};}
  checkUserFlow();
  if(!localStorage.getItem('vw_guide')){setTimeout(function(){document.getElementById('guideOverlay').classList.remove('hidden');},500);}
})();
</script>
